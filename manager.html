<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manager Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #game {
      width: 800px;
      max-width: 95vw;
      background: #1b1b1b;
      border: 2px solid #444;
      margin: 20px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
    }
    h1, h2, h3 {
      text-align: center;
      margin-top: 0;
    }
    button {
      background: #2e7d32;
      color: #fff;
      border: none;
      padding: 8px 14px;
      margin: 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover {
      background: #388e3c;
    }
    .danger {
      background: #c62828;
    }
    .danger:hover {
      background: #e53935;
    }
    .menu-btn {
      width: 100%;
      text-align: left;
    }
    .section {
      border-top: 1px solid #444;
      margin-top: 15px;
      padding-top: 10px;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    .stat-box {
      background: #222;
      padding: 8px 10px;
      border-radius: 4px;
      flex: 1 1 120px;
    }
    .log {
      background: #000;
      padding: 10px;
      border-radius: 4px;
      height: 160px;
      overflow-y: auto;
      font-size: 13px;
      border: 1px solid #333;
    }
    .log-entry {
      margin-bottom: 4px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div id="game">
  <h1>Manager Simulator</h1>
  <div id="screen-main">
    <h2>Main Menu</h2>
    <p>Select a manager career:</p>
    <button class="menu-btn" onclick="startStoreManager()">Store Manager</button>
    <button class="menu-btn" onclick="startTheaterManager()">Movie Theater Manager</button>
    <!-- Add more careers later -->
    <div class="section">
      <button class="danger" onclick="resetGame()">Reset Game</button>
    </div>
  </div>

  <div id="screen-store" style="display:none;">
    <div class="top-bar">
      <h2>Store Manager</h2>
      <button onclick="backToMain()">Back to Main Menu</button>
    </div>
    <div class="stats">
      <div class="stat-box">Day: <span id="store-day">1</span></div>
      <div class="stat-box">Money: $<span id="store-money">5000</span></div>
      <div class="stat-box">Reputation: <span id="store-rep">50</span></div>
      <div class="stat-box">Inventory: <span id="store-inv">100</span></div>
    </div>
    <div class="section">
      <h3>Actions</h3>
      <button onclick="storeOrderInventory()">Order Inventory</button>
      <button onclick="storeRunSale()">Run Sale</button>
      <button onclick="storeCustomerIssue()">Handle Customer Issue</button>
      <button onclick="storeEndDay()">End Day</button>
    </div>
    <div class="section">
      <h3>Activity Log</h3>
      <div id="store-log" class="log"></div>
    </div>
  </div>

  <div id="screen-theater" style="display:none;">
    <div class="top-bar">
      <h2>Movie Theater Manager</h2>
      <button onclick="backToMain()">Back to Main Menu</button>
    </div>
    <div class="stats">
      <div class="stat-box">Day: <span id="theater-day">1</span></div>
      <div class="stat-box">Money: $<span id="theater-money">8000</span></div>
      <div class="stat-box">Reputation: <span id="theater-rep">60</span></div>
      <div class="stat-box">Popcorn Stock: <span id="theater-popcorn">50</span></div>
    </div>
    <div class="section">
      <h3>Actions</h3>
      <button onclick="theaterBuyPopcorn()">Buy Popcorn Supplies</button>
      <button onclick="theaterSellTickets()">Sell Tickets</button>
      <button onclick="theaterProjectionIssue()">Handle Projection Issue</button>
      <button onclick="theaterEndDay()">End Day</button>
    </div>
    <div class="section">
      <h3>Activity Log</h3>
      <div id="theater-log" class="log"></div>
    </div>
  </div>
</div>

<script>
  // ========= GLOBAL NAVIGATION =========
  function showScreen(id) {
    document.getElementById('screen-main').style.display = 'none';
    document.getElementById('screen-store').style.display = 'none';
    document.getElementById('screen-theater').style.display = 'none';
    document.getElementById(id).style.display = 'block';
  }

  function backToMain() {
    showScreen('screen-main');
  }

  function resetGame() {
    // Reset store
    storeState.day = 1;
    storeState.money = 5000;
    storeState.reputation = 50;
    storeState.inventory = 100;
    updateStoreUI();
    clearLog('store-log');

    // Reset theater
    theaterState.day = 1;
    theaterState.money = 8000;
    theaterState.reputation = 60;
    theaterState.popcorn = 50;
    updateTheaterUI();
    clearLog('theater-log');

    showScreen('screen-main');
  }

  function addLog(logId, text) {
    const log = document.getElementById(logId);
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function clearLog(logId) {
    const log = document.getElementById(logId);
    log.innerHTML = '';
  }

  // ========= STORE MANAGER =========
  const storeState = {
    day: 1,
    money: 5000,
    reputation: 50,
    inventory: 100
  };

  function updateStoreUI() {
    document.getElementById('store-day').textContent = storeState.day;
    document.getElementById('store-money').textContent = storeState.money;
    document.getElementById('store-rep').textContent = storeState.reputation;
    document.getElementById('store-inv').textContent = storeState.inventory;
  }

  function startStoreManager() {
    showScreen('screen-store');
    updateStoreUI();
  }

  function storeOrderInventory() {
    const cost = 500;
    const amount = 50;
    if (storeState.money >= cost) {
      storeState.money -= cost;
      storeState.inventory += amount;
      updateStoreUI();
      addLog('store-log', `Ordered ${amount} units for $${cost}.`);
    } else {
      addLog('store-log', 'Not enough money to order inventory!');
    }
  }

  function storeRunSale() {
    if (storeState.inventory <= 0) {
      addLog('store-log', 'No inventory to sell!');
      return;
    }
    const sold = Math.min(
      storeState.inventory,
      Math.floor(Math.random() * 21) + 10 // 10–30
    );
    const revenue = sold * 20;
    storeState.inventory -= sold;
    storeState.money += revenue;
    updateStoreUI();
    addLog('store-log', `Sold ${sold} items and earned $${revenue}.`);
  }

  function storeCustomerIssue() {
    const outcome = Math.random() < 0.5 ? 'good' : 'bad';
    if (outcome === 'good') {
      storeState.reputation += 5;
      addLog('store-log', 'You resolved the issue well! Reputation increased.');
    } else {
      storeState.reputation -= 5;
      addLog('store-log', 'The customer left unhappy. Reputation decreased.');
    }
    updateStoreUI();
  }

  function storeEndDay() {
    storeState.day += 1;
    updateStoreUI();
    addLog('store-log', `Day ${storeState.day - 1} ended. A new day begins.`);
  }

  // ========= MOVIE THEATER MANAGER =========
  const theaterState = {
    day: 1,
    money: 8000,
    reputation: 60,
    popcorn: 50
  };

  function updateTheaterUI() {
    document.getElementById('theater-day').textContent = theaterState.day;
    document.getElementById('theater-money').textContent = theaterState.money;
    document.getElementById('theater-rep').textContent = theaterState.reputation;
    document.getElementById('theater-popcorn').textContent = theaterState.popcorn;
  }

  function startTheaterManager() {
    showScreen('screen-theater');
    updateTheaterUI();
  }

  function theaterBuyPopcorn() {
    const cost = 300;
    const amount = 40;
    if (theaterState.money >= cost) {
      theaterState.money -= cost;
      theaterState.popcorn += amount;
      updateTheaterUI();
      addLog('theater-log', `Bought ${amount} popcorn units for $${cost}.`);
    } else {
      addLog('theater-log', 'Not enough money to buy popcorn supplies!');
    }
  }

  function theaterSellTickets() {
    const sold = Math.floor(Math.random() * 61) + 20; // 20–80
    const revenue = sold * 15;
    theaterState.money += revenue;

    // Optional popcorn usage
    const popcornUsed = Math.min(theaterState.popcorn, Math.floor(sold * 0.5));
    theaterState.popcorn -= popcornUsed;

    updateTheaterUI();
    addLog(
      'theater-log',
      `Sold ${sold} tickets and earned $${revenue}. Used ${popcornUsed} popcorn.`
    );
  }

  function theaterProjectionIssue() {
    const outcome = Math.random() < 0.5 ? 'good' : 'bad';
    if (outcome === 'good') {
      theaterState.reputation += 3;
      addLog('theater-log', 'You fixed the projector quickly! Reputation increased.');
    } else {
      theaterState.reputation -= 7;
      addLog('theater-log', 'The movie was delayed. Customers are upset. Reputation decreased.');
    }
    updateTheaterUI();
  }

  function theaterEndDay() {
    theaterState.day += 1;
    updateTheaterUI();
    addLog('theater-log', `Day ${theaterState.day - 1} ended. A new day begins.`);
  }
</script>
</body>
</html>
