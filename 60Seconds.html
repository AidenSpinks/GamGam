<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>60 Seconds‑like Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; padding:0; }
    #game { max-width: 800px; margin: 20px auto; padding: 20px; background:#222; border-radius:8px; }
    button { margin: 4px; padding: 6px 10px; cursor:pointer; }
    .hidden { display:none; }
    .item-btn { display:block; width:100%; text-align:left; }
    #log { max-height: 250px; overflow-y:auto; background:#000; padding:10px; margin-top:10px; font-size:0.9em; }
    #log p { margin: 4px 0; }
  </style>
</head>
<body>
<div id="game">
  <h1>60 Seconds‑like Prototype</h1>

  <!-- SCAVENGE PHASE -->
  <div id="scavenge-phase">
    <h2>Scavenge Phase</h2>
    <p>You have limited picks before the bomb hits. Grab what you can!</p>
    <p><strong>Picks left:</strong> <span id="picks-left"></span></p>
    <div id="items-list"></div>
    <button id="finish-scavenge">Finish Early</button>
  </div>

  <!-- SHELTER PHASE -->
  <div id="shelter-phase" class="hidden">
    <h2>Shelter Phase</h2>
    <p><strong>Day:</strong> <span id="day"></span></p>
    <p><strong>Health:</strong> <span id="health"></span> |
       <strong>Morale:</strong> <span id="morale"></span></p>
    <p><strong>Food:</strong> <span id="food"></span> |
       <strong>Water:</strong> <span id="water"></span></p>

    <div id="actions">
      <button id="btn-scavenge">Send scavenger</button>
      <button id="btn-next-day">End day</button>
    </div>

    <div id="log"></div>
  </div>
</div>

<script>
  // -----------------------------
  // Data
  // -----------------------------
  const houseItems = [
    { name: "Soup Can", type: "food" },
    { name: "Water Bottle", type: "water" },
    { name: "Axe", type: "tool" },
    { name: "Radio", type: "tool" },
    { name: "First Aid Kit", type: "tool" },
    { name: "Daughter", type: "person" },
    { name: "Son", type: "person" },
    { name: "Spouse", type: "person" },
  ];

  const randomEvents = ["raiders", "strange_noise", "trader", "nothing"];

  const player = {
    inventory: [],
    day: 1,
    health: 100,
    morale: 100,
    food: 0,
    water: 0,
    alive: true
  };

  // -----------------------------
  // Helpers
  // -----------------------------
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function recalcResources() {
    player.food = player.inventory.filter(i => i.type === "food").length;
    player.water = player.inventory.filter(i => i.type === "water").length;
  }

  function consumeResources() {
    if (player.food > 0) {
      player.food--;
    } else {
      player.health -= 10;
      logMsg("You had no food. Health -10.");
    }

    if (player.water > 0) {
      player.water--;
    } else {
      player.health -= 15;
      logMsg("You had no water. Health -15.");
    }

    player.morale -= 3;
    if (player.health <= 0 || player.morale <= 0) {
      player.alive = false;
    }
  }

  function logMsg(msg) {
    const log = document.getElementById("log");
    const p = document.createElement("p");
    p.textContent = msg;
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
  }

  // -----------------------------
  // Scavenge Phase
  // -----------------------------
  let picksLeft = 10;
  let availableItems = shuffle([...houseItems]);

  const picksSpan = document.getElementById("picks-left");
  const itemsListDiv = document.getElementById("items-list");
  const scavengePhaseDiv = document.getElementById("scavenge-phase");
  const shelterPhaseDiv = document.getElementById("shelter-phase");

  function renderScavenge() {
    picksSpan.textContent = picksLeft;
    itemsListDiv.innerHTML = "";
    availableItems.forEach((item, index) => {
      const btn = document.createElement("button");
      btn.className = "item-btn";
      btn.textContent = `${item.name} [${item.type}]`;
      btn.onclick = () => pickItem(index);
      itemsListDiv.appendChild(btn);
    });
  }

  function pickItem(index) {
    if (picksLeft <= 0) return;
    const item = availableItems.splice(index, 1)[0];
    player.inventory.push(item);
    picksLeft--;
    renderScavenge();
    if (picksLeft <= 0) {
      startShelterPhase();
    }
  }

  document.getElementById("finish-scavenge").onclick = () => {
    startShelterPhase();
  };

  function startShelterPhase() {
    scavengePhaseDiv.classList.add("hidden");
    shelterPhaseDiv.classList.remove("hidden");
    recalcResources();
    updateShelterUI();
    logMsg("You made it to the shelter with: " +
      player.inventory.map(i => i.name).join(", "));
  }

  // -----------------------------
  // Shelter Phase
  // -----------------------------
  const daySpan = document.getElementById("day");
  const healthSpan = document.getElementById("health");
  const moraleSpan = document.getElementById("morale");
  const foodSpan = document.getElementById("food");
  const waterSpan = document.getElementById("water");

  function updateShelterUI() {
    daySpan.textContent = player.day;
    healthSpan.textContent = player.health;
    moraleSpan.textContent = player.morale;
    foodSpan.textContent = player.food;
    waterSpan.textContent = player.water;
  }

  function handleEvent() {
    const event = randomEvents[Math.floor(Math.random() * randomEvents.length)];
    logMsg("Event: " + event.toUpperCase());

    if (event === "nothing") {
      logMsg("Nothing special happens today.");
      return;
    }

    if (event === "raiders") {
      const hasAxe = player.inventory.some(i => i.name === "Axe");
      if (hasAxe) {
        logMsg("Raiders tried to break in, but you scared them off with your axe.");
      } else {
        logMsg("Raiders stole some of your supplies!");
        if (player.inventory.length > 0) {
          const idx = Math.floor(Math.random() * player.inventory.length);
          const lost = player.inventory.splice(idx, 1)[0];
          logMsg("You lost: " + lost.name);
          recalcResources();
        }
      }
    } else if (event === "strange_noise") {
      const open = confirm("You hear strange noises outside. Open the hatch?");
      if (open) {
        const outcome = Math.random() < 0.5 ? "good" : "bad";
        if (outcome === "good") {
          logMsg("You found some supplies outside!");
          player.inventory.push({ name: "Soup Can", type: "food" });
          player.inventory.push({ name: "Water Bottle", type: "water" });
          recalcResources();
        } else {
          logMsg("You were injured by something outside. Health -20.");
          player.health -= 20;
        }
      } else {
        logMsg("You decide to stay put.");
      }
    } else if (event === "trader") {
      logMsg("A trader knocks, offering water for food.");
      if (player.food > 0) {
        const trade = confirm("Trade 1 food for 2 water?");
        if (trade) {
          const idx = player.inventory.findIndex(i => i.type === "food");
          if (idx !== -1) player.inventory.splice(idx, 1);
          player.inventory.push({ name: "Water Bottle", type: "water" });
          player.inventory.push({ name: "Water Bottle", type: "water" });
          recalcResources();
          logMsg("Trade completed.");
        } else {
          logMsg("You decline the offer.");
        }
      } else {
        logMsg("You have no food to trade.");
      }
    }
  }

  function endDay() {
    if (!player.alive) return;
    handleEvent();
    consumeResources();
    recalcResources();
    updateShelterUI();

    if (!player.alive) {
      logMsg("You did not survive the apocalypse...");
      alert("Game over");
      return;
    }

    if (player.day >= 20) {
      logMsg("You survived long enough to be rescued!");
      alert("You win! Rescued on day " + player.day);
      return;
    }

    player.day++;
    updateShelterUI();
  }

  document.getElementById("btn-scavenge").onclick = () => {
    if (!player.alive) return;
    const roll = Math.random();
    if (roll < 0.4) {
      logMsg("Scavenge successful! You found some supplies.");
      player.inventory.push({ name: "Soup Can", type: "food" });
      player.inventory.push({ name: "Water Bottle", type: "water" });
      recalcResources();
      updateShelterUI();
    } else if (roll < 0.8) {
      logMsg("Scavenge failed. They came back empty-handed.");
    } else {
      logMsg("Scavenger was injured on the surface. Health -15.");
      player.health -= 15;
      updateShelterUI();
    }
  };

  document.getElementById("btn-next-day").onclick = () => {
    endDay();
  };

  // Init
  renderScavenge();
</script>
</body>
</html>
