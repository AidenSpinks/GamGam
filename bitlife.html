<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Life Simulator</title>
<style>
  body {
    background: #111;
    color: #eee;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding-top: 30px;
  }

  .container {
    width: 480px;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
  }

  h1 {
    text-align: center;
  }

  .stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .stat {
    background: #222;
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 14px;
  }

  .tabs {
    display: flex;
    margin-top: 15px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    background: #222;
    text-align: center;
    cursor: pointer;
    border-right: 1px solid #333;
  }

  .tab:last-child {
    border-right: none;
  }

  .tab.active {
    background: #444;
  }

  .tab-content {
    margin-top: 15px;
    background: #101010;
    padding: 15px;
    border-radius: 8px;
    min-height: 150px;
  }

  button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 5px;
    background: #1565c0;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #1e7be0;
  }

  .choice-btn {
    background: #2e7d32;
  }

  .choice-btn:hover {
    background: #3fa447;
  }

  .log {
    background: #000;
    padding: 10px;
    height: 150px;
    overflow-y: auto;
    border-radius: 5px;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Life Simulator</h1>

  <div class="stats">
    <div class="stat" id="ageStat">Age: 0</div>
    <div class="stat" id="healthStat">Health: 50</div>
    <div class="stat" id="happyStat">Happiness: 50</div>
    <div class="stat" id="moneyStat">Money: $0</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="ageTab">Age</div>
    <div class="tab" data-tab="actionsTab">Actions</div>
    <div class="tab" data-tab="jobsTab">Jobs</div>
    <div class="tab" data-tab="relationshipsTab">Relationships</div>
  </div>

  <!-- Tab Content -->
  <div class="tab-content" id="ageTab">
    <button id="nextYearBtn">Start Life</button>
  </div>

  <div class="tab-content" id="actionsTab" style="display:none;">
    <button class="choice-btn" onclick="doAction('study')">Study (+Happiness -2, +Health 0)</button>
    <button class="choice-btn" onclick="doAction('workout')">Work Out (+Health 5, -Happiness 1)</button>
    <button class="choice-btn" onclick="doAction('meditate')">Meditate (+Happiness 4)</button>
  </div>

  <div class="tab-content" id="jobsTab" style="display:none;">
    <div id="jobStatus">You are unemployed.</div>
    <button onclick="applyForJob('Retail Worker', 15000)">Apply: Retail Worker ($15k/yr)</button>
    <button onclick="applyForJob('Office Assistant', 25000)">Apply: Office Assistant ($25k/yr)</button>
    <button onclick="applyForJob('Software Developer', 60000)">Apply: Software Developer ($60k/yr)</button>
  </div>

  <div class="tab-content" id="relationshipsTab" style="display:none;">
    <div id="relationshipList">No relationships yet.</div>
    <button onclick="meetPerson()">Meet Someone</button>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
let state = {
  age: 0,
  health: 50,
  happiness: 50,
  money: 0,
  job: null,
  salary: 0,
  relationships: []
};

function updateStats() {
  document.getElementById("ageStat").textContent = "Age: " + state.age;
  document.getElementById("healthStat").textContent = "Health: " + state.health;
  document.getElementById("happyStat").textContent = "Happiness: " + state.happiness;
  document.getElementById("moneyStat").textContent = "Money: $" + state.money;
}

function log(msg) {
  const logBox = document.getElementById("log");
  logBox.innerHTML += `<div>${msg}</div>`;
  logBox.scrollTop = logBox.scrollHeight;
}

/* ---------------- TAB SWITCHING ---------------- */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
    document.getElementById(tab.dataset.tab).style.display = "block";
  });
});

/* ---------------- AGE PROGRESSION ---------------- */
document.getElementById("nextYearBtn").addEventListener("click", () => {
  state.age++;
  log(`You are now ${state.age} years old.`);

  // yearly salary
  if (state.job) {
    state.money += state.salary;
    log(`You earned $${state.salary} from your job as a ${state.job}.`);
  }

  // passive aging effects
  state.health -= Math.random() < 0.3 ? 1 : 0;
  state.happiness -= Math.random() < 0.2 ? 1 : 0;

  updateStats();
});

/* ---------------- ACTIONS TAB ---------------- */
function doAction(type) {
  if (type === "study") {
    state.happiness -= 2;
    log("You studied hard.");
  }
  if (type === "workout") {
    state.health += 5;
    state.happiness -= 1;
    log("You worked out.");
  }
  if (type === "meditate") {
    state.happiness += 4;
    log("You meditated.");
  }
  updateStats();
}

/* ---------------- JOBS TAB ---------------- */
function applyForJob(title, salary) {
  const success = Math.random() < 0.7;
  if (success) {
    state.job = title;
    state.salary = salary;
    document.getElementById("jobStatus").textContent = `Employed as: ${title}`;
    log(`You got the job: ${title}!`);
  } else {
    log(`You were rejected for the ${title} job.`);
  }
}

/* ---------------- RELATIONSHIPS TAB ---------------- */
function meetPerson() {
  const names = ["Alex", "Jordan", "Taylor", "Sam", "Casey", "Morgan"];
  const name = names[Math.floor(Math.random() * names.length)];

  const person = {
    name,
    relationship: Math.floor(Math.random() * 40) + 10
  };

  state.relationships.push(person);
  updateRelationships();
  log(`You met ${name}.`);
}

function updateRelationships() {
  const list = document.getElementById("relationshipList");
  list.innerHTML = state.relationships
    .map(r => `${r.name} — Relationship: ${r.relationship}`)
    .join("<br>");
}

updateStats();
</script>

</body>
</html>
