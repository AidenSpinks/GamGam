<!DOCTYPE html>
<html>
<head>
  <title>Geometry Dash Style Game</title>
  <style>
    body{margin:0;background:#111;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;color:white}
    canvas{background:#222;border:3px solid #fff;display:none}
    #menu,#levelSelect,#rocketSelect{text-align:center}
    #title{font-size:48px;margin-bottom:20px}
    .btn{padding:15px 40px;font-size:24px;background:cyan;border:none;cursor:pointer;border-radius:10px;margin:10px}
    .btn:hover{background:#00e0ff}
    #progressContainer{width:800px;height:10px;background:#444;border:2px solid white;position:absolute;top:10px;display:none}
    #progressBar{height:100%;width:0%;background:lime}
    #attemptText{position:absolute;top:30px;font-size:20px;display:none}
    #hackText{position:absolute;top:50px;left:10px;font-family:monospace;font-size:12px;image-rendering:pixelated;display:none}
    #hackBtn{position:absolute;top:70px;left:10px;font-family:monospace;font-size:12px;image-rendering:pixelated;display:none}
  </style>
</head>
<body>
  <div id="menu">
    <div id="title">Geometry Dash Clone</div>
    <button id="playBtn" class="btn">Play</button>
  </div>

  <div id="levelSelect" style="display:none;">
    <div id="title">Select Level</div>
    <button id="level1Btn" class="btn">Level 1 – Cube</button>
    <button id="level2Btn" class="btn">Level 2 – Rocket</button>
  </div>

  <div id="rocketSelect" style="display:none;">
    <div id="title">Select Rocket</div>
    <button id="rocketClassicBtn" class="btn">Classic Rocket</button>
    <button id="rocketSharkBtn" class="btn">Shark Rocket</button>
  </div>

  <div id="progressContainer"><div id="progressBar"></div></div>
  <div id="attemptText">Attempt: 1</div>
  <div id="hackText">Noah is hacking for me :3</div>
  <button id="hackBtn">Hacks</button>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <audio id="music2" src="bill the nye.mp3"></audio>

  <script>
    const canvas=document.getElementById("gameCanvas");
    const ctx=canvas.getContext("2d");
    const menu=document.getElementById("menu");
    const playBtn=document.getElementById("playBtn");
    const levelSelect=document.getElementById("levelSelect");
    const level1Btn=document.getElementById("level1Btn");
    const level2Btn=document.getElementById("level2Btn");
    const rocketSelect=document.getElementById("rocketSelect");
    const rocketClassicBtn=document.getElementById("rocketClassicBtn");
    const rocketSharkBtn=document.getElementById("rocketSharkBtn");
    const progressContainer=document.getElementById("progressContainer");
    const progressBar=document.getElementById("progressBar");
    const attemptText=document.getElementById("attemptText");
    const hackText=document.getElementById("hackText");
    const hackBtn=document.getElementById("hackBtn");
    const music2=document.getElementById("music2");

    let gameRunning=false;
    let attempt=1;
    const LEVEL1_LENGTH=20000;
    const LEVEL2_LENGTH=18000;
    let levelLength=LEVEL1_LENGTH;
    let speed=6;
    let currentLevel=1;
    let rocketStyle=1;
    let distanceTravelled=0;
    let player;
    let spikes=[];
    let platforms=[];
    let jumpPads=[];
    let clouds=[];
    let hills=[];
    let mountains=[];
    let rocketThrust=false;

    let botMode=false;
    let perfectBot=false;
    let botTimer=0;
    let lastClickTime=0;

    function stopAllMusic(){
      music2.pause();
      music2.currentTime=0;
    }

    playBtn.onclick=()=>{
      stopAllMusic();
      menu.style.display="none";
      levelSelect.style.display="block";
    };

    level1Btn.onclick=()=>{
      currentLevel=1;
      startLevel();
    };

    level2Btn.onclick=()=>{
      currentLevel=2;
      levelSelect.style.display="none";
      rocketSelect.style.display="block";
    };

    rocketClassicBtn.onclick=()=>{
      rocketStyle=1;
      startLevel();
    };

    rocketSharkBtn.onclick=()=>{
      rocketStyle=2;
      startLevel();
    };

    hackBtn.onclick=()=>{
      const now=Date.now();
      if(now-lastClickTime<2000){
        perfectBot=true;
        botMode=true;
      }else{
        botMode=!botMode;
        if(!botMode)perfectBot=false;
      }
      lastClickTime=now;
    };

    function resetPlayer(){
      if(currentLevel===1){
        player={x:50,y:300,width:40,height:40,dy:0,gravity:0.6,jumpPower:-12,grounded:false,rotation:0,eyeBlink:0};
      }else{
        player={x:120,y:200,width:50,height:30,dy:0,gravity:0.25,rotation:0};
      }
    }

    function generateBackground(){
      clouds=[];hills=[];mountains=[];
      for(let i=0;i<10;i++){
        clouds.push({x:Math.random()*levelLength,y:50+Math.random()*80,width:80,height:40});
      }
      for(let i=0;i<12;i++){
        hills.push({x:i*800,y:300,width:300,height:100});
      }
      for(let i=0;i<8;i++){
        mountains.push({x:i*1000,y:200,width:400,height:200});
      }
    }

    function generateLevel(){
      spikes=[];platforms=[];jumpPads=[];
      if(currentLevel===1){
        levelLength=LEVEL1_LENGTH;
        for(let i=500;i<levelLength;i+=600){
          spikes.push({x:i,y:360,width:30,height:30});
        }
        for(let i=1000;i<levelLength;i+=1500){
          platforms.push({x:i,y:260,width:120,height:10});
        }
        for(let i=2000;i<levelLength;i+=2500){
          jumpPads.push({x:i,y:350,width:40,height:10});
        }
      }else{
        levelLength=LEVEL2_LENGTH;
        platforms.push({x:0,y:0,width:levelLength,height:20});
        for(let i=600;i<levelLength;i+=900){
          spikes.push({x:i,y:360,width:30,height:30});
        }
        for(let i=1200;i<levelLength;i+=1200){
          spikes.push({x:i,y:220,width:30,height:30});
          spikes.push({x:i+40,y:220,width:30,height:30});
          spikes.push({x:i+80,y:220,width:30,height:30});
        }
        for(let i=3000;i<levelLength;i+=3000){
          spikes.push({x:i,y:320,width:30,height:30});
          spikes.push({x:i,y:280,width:30,height:30});
          spikes.push({x:i,y:240,width:30,height:30});
        }
        platforms.push({x:2000,y:80,width:400,height:20});
        platforms.push({x:2000,y:280,width:400,height:20});
        platforms.push({x:5000,y:100,width:450,height:20});
        platforms.push({x:5000,y:260,width:450,height:20});
        platforms.push({x:8000,y:60,width:450,height:20});
        platforms.push({x:8000,y:240,width:450,height:20});
        platforms.push({x:6500,y:150,width:60,height:120});
        platforms.push({x:9500,y:180,width:60,height:140});
      }
    }

    function startLevel(){
      stopAllMusic();
      if(currentLevel===2){
        music2.loop=true;
        music2.play();
      }
      levelSelect.style.display="none";
      rocketSelect.style.display="none";
      canvas.style.display="block";
      progressContainer.style.display="block";
      attemptText.style.display="block";
      hackText.style.display="block";
      hackBtn.style.display="block";
      resetPlayer();
      generateLevel();
      generateBackground();
      distanceTravelled=0;
      progressBar.style.width="0%";
      attemptText.textContent="Attempt: "+attempt;
      gameRunning=true;
      botTimer=0;
      requestAnimationFrame(update);
    }

    document.addEventListener("keydown",e=>{
      if(!gameRunning)return;
      if(botMode)return;
      if(currentLevel===1){
        if(player.grounded){
          player.dy=player.jumpPower;
          player.grounded=false;
        }
      }else{
        if(e.code==="Space"||e.code==="ArrowUp"){
          rocketThrust=true;
        }
      }
    });

    document.addEventListener("keyup",e=>{
      if(botMode)return;
      if(currentLevel===2){
        if(e.code==="Space"||e.code==="ArrowUp"){
          rocketThrust=false;
        }
      }
    });

    canvas.addEventListener("mousedown",()=>{
      if(!botMode&&currentLevel===2)rocketThrust=true;
    });
    canvas.addEventListener("mouseup",()=>{
      if(!botMode&&currentLevel===2)rocketThrust=false;
    });

    function drawCloud(c){
      ctx.fillStyle="#ffffff";
      ctx.beginPath();
      ctx.ellipse(c.x,c.y,40,20,0,0,Math.PI*2);
      ctx.fill();
    }

    function drawHill(h){
      ctx.fillStyle="#335533";
      ctx.beginPath();
      ctx.ellipse(h.x,h.y,150,50,0,0,Math.PI*2);
      ctx.fill();
    }

    function drawMountain(m){
      ctx.fillStyle="#444";
      ctx.beginPath();
      ctx.moveTo(m.x,m.y+m.height);
      ctx.lineTo(m.x+m.width/2,m.y);
      ctx.lineTo(m.x+m.width,m.y+m.height);
      ctx.closePath();
      ctx.fill();
    }

    function drawJetpackSpike(o){
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.moveTo(o.x,o.y);
      ctx.lineTo(o.x+o.width/2,o.y-o.height);
      ctx.lineTo(o.x+o.width,o.y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle="#555";
      ctx.fillRect(o.x+5,o.y+5,20,10);
      ctx.fillStyle=Math.random()<0.5?"orange":"yellow";
      ctx.beginPath();
      ctx.moveTo(o.x+15,o.y+15);
      ctx.lineTo(o.x+10,o.y+25);
      ctx.lineTo(o.x+20,o.y+15);
      ctx.closePath();
      ctx.fill();
    }

    function drawPlatform(p){
      ctx.fillStyle="#888";
      ctx.fillRect(p.x,p.y,p.width,p.height);
    }

    function drawJumpPad(j){
      ctx.fillStyle="yellow";
      ctx.fillRect(j.x,j.y,j.width,j.height);
    }

    function drawCubePlayer(){
      ctx.save();
      ctx.translate(player.x+player.width/2,player.y+player.height/2);
      ctx.rotate(player.rotation);
      ctx.fillStyle="cyan";
      ctx.fillRect(-player.width/2,-player.height/2,player.width,player.height);
      ctx.restore();
      ctx.fillStyle="black";
      let blink=player.eyeBlink>0;
      if(!blink){
        ctx.fillRect(player.x+10,player.y+10,8,8);
        ctx.fillRect(player.x+25,player.y+10,8,8);
      }
      if(Math.random()<0.01)player.eyeBlink=5;
      if(player.eyeBlink>0)player.eyeBlink--;
    }

    function drawClassicRocket(){
      ctx.save();
      ctx.translate(player.x+player.width/2,player.y+player.height/2);
      ctx.rotate(player.rotation);
      ctx.fillStyle="cyan";
      ctx.fillRect(-20,-10,40,20);
      ctx.beginPath();
      ctx.moveTo(20,-10);
      ctx.lineTo(35,0);
      ctx.lineTo(20,10);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle="blue";
      ctx.beginPath();
      ctx.moveTo(-20,-10);
      ctx.lineTo(-30,0);
      ctx.lineTo(-20,10);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawSharkRocket(){
      ctx.save();
      ctx.translate(player.x+player.width/2,player.y+player.height/2);
      ctx.rotate(player.rotation);
      ctx.fillStyle="#888";
      ctx.fillRect(-20,-10,40,20);
      ctx.beginPath();
      ctx.moveTo(20,-10);
      ctx.lineTo(35,0);
      ctx.lineTo(20,10);
      ctx.closePath();
      ctx.fillStyle="#888";
      ctx.fill();
      ctx.fillStyle="#555";
      ctx.beginPath();
      ctx.moveTo(-20,-10);
      ctx.lineTo(-30,0);
      ctx.lineTo(-20,10);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(5,-5,4,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="black";
      ctx.beginPath();
      ctx.arc(5,-5,2,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.moveTo(10,0);
      ctx.lineTo(18,-4);
      ctx.lineTo(18,4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle="black";
      ctx.beginPath();
      ctx.moveTo(10,0);
      ctx.lineTo(18,-2);
      ctx.lineTo(18,2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawRocketPlayer(){
      if(rocketStyle===1)drawClassicRocket();else drawSharkRocket();
    }

    function die(){
      stopAllMusic();
      attempt++;
      startLevel();
    }

    function botLogicCube(){
      if(perfectBot){
        let lookAhead=220;
        for(let s of spikes){
          let relX=s.x-distanceTravelled;
          if(relX>player.x && relX<player.x+lookAhead){
            if(player.grounded){
              player.dy=player.jumpPower;
              player.grounded=false;
            }
            break;
          }
        }
      }else{
        if(botTimer%5===0){
          let danger=false;
          for(let s of spikes){
            let relX=s.x-distanceTravelled;
            if(relX>player.x+20 && relX<player.x+140){
              danger=true;
              break;
            }
          }
          if(danger && Math.random()<0.8){
            player.dy=player.jumpPower;
            player.grounded=false;
          }else if(Math.random()<0.05){
            player.dy=player.jumpPower;
            player.grounded=false;
          }
        }
      }
    }

 if (perfectBot) {
    let farMin = 400, farMax = 600;
    let medMin = 200, medMax = 400;
    let closeMin = 0, closeMax = 200;

    let topLimit = 0;
    let bottomLimit = 360;

    let corridor = false;
    let corridorWithSpikes = false;

    let spikeThreat = false;
    let spikeTargetY = null;

    // FAR zone: detect corridors
    for (let p of platforms) {
        let relX = p.x - distanceTravelled;
        if (relX > farMin && relX < farMax) {
            corridor = true;
            if (p.y < 200) {
                topLimit = Math.max(topLimit, p.y + p.height + 25);
            } else {
                bottomLimit = Math.min(bottomLimit, p.y - 25);
            }
        }
    }

    // MEDIUM + CLOSE: detect spikes and corridor spikes
    for (let s of spikes) {
        let relX = s.x - distanceTravelled;

        if (relX > medMin && relX < farMax && corridor) {
            corridorWithSpikes = true;
        }

        if (relX > closeMin && relX < medMax) {
            spikeThreat = true;

            const spikeTop = s.y - s.height;
            const spikeBottom = s.y;

            const spaceAbove = spikeTop - topLimit;
            const spaceBelow = bottomLimit - spikeBottom;

            let safeY;

            if (spaceAbove > 40 && spaceBelow > 40) {
                safeY = (spaceAbove > spaceBelow)
                    ? spikeTop - 30
                    : spikeBottom + 30;
            } else if (spaceAbove > 40) {
                safeY = spikeTop - 30;
            } else if (spaceBelow > 40) {
                safeY = spikeBottom + 30;
            } else {
                safeY = spikeTop - 30;
            }

            if (spikeTargetY === null) spikeTargetY = safeY;
            else spikeTargetY = (spikeTargetY + safeY) / 2;
        }
    }

    let mode;
    if (corridor && corridorWithSpikes) mode = "hybrid";
    else if (corridor) mode = "corridor";
    else mode = "open";

    let targetY = 200;

    if (mode === "open") {
        targetY = 200;
        if (spikeThreat && spikeTargetY !== null) {
            targetY = spikeTargetY;
        }
    }

    else if (mode === "corridor") {
        let safeTop = topLimit;
        let safeBottom = bottomLimit;

        if (safeBottom - safeTop < 40) {
            safeTop = Math.max(40, safeTop - 10);
            safeBottom = Math.min(320, safeBottom + 10);
        }

        targetY = (safeTop + safeBottom) / 2;
    }

    else if (mode === "hybrid") {
        let safeTop = topLimit;
        let safeBottom = bottomLimit;

        for (let s of spikes) {
            let relX = s.x - distanceTravelled;
            if (relX > closeMin && relX < farMax) {
                if (s.y < 200) {
                    safeTop = Math.max(safeTop, s.y + 40);
                } else {
                    safeBottom = Math.min(safeBottom, s.y - 40);
                }
            }
        }

        if (safeBottom - safeTop < 40) {
            safeTop = Math.max(40, safeTop - 10);
            safeBottom = Math.min(320, safeBottom + 10);
        }

        targetY = (safeTop + safeBottom) / 2;

        if (spikeThreat && spikeTargetY !== null) {
            targetY = (targetY * 2 + spikeTargetY) / 3;
        }
    }

    if (player.y > targetY + 15) rocketThrust = true;
    else if (player.y < targetY - 15) rocketThrust = false;

} else {

    if (botTimer % 5 === 0) {
        let targetY = 200;

        for (let p of platforms) {
            let relX = p.x - distanceTravelled;
            if (relX > player.x && relX < player.x + 250) {
                if (p.y > 200) targetY = 150;
                else targetY = 250;
            }
        }

        if (player.y > targetY + 20) rocketThrust = true;
        else if (player.y < targetY - 20) rocketThrust = false;
        else rocketThrust = Math.random() < 0.5;
    }
}
    function update(){
      if(!gameRunning)return;

      botTimer++;
      if(botMode){
        if(currentLevel===1)botLogicCube();
        else botLogicRocket();
      }

      ctx.clearRect(0,0,canvas.width,canvas.height);
      distanceTravelled+=speed;
      let progress=Math.min(distanceTravelled/levelLength,1);
      progressBar.style.width=(progress*100)+"%";
      if(progress>=1){
        alert("Level Complete!");
        document.location.reload();
      }

      for(let m of mountains){m.x-=speed*0.2;drawMountain(m);}
      for(let h of hills){h.x-=speed*0.4;drawHill(h);}
      for(let c of clouds){c.x-=speed*0.1;drawCloud(c);}

      ctx.strokeStyle="#555";
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(0,360);
      ctx.lineTo(canvas.width,360);
      ctx.stroke();

      if(currentLevel===1){
        player.dy+=player.gravity;
        player.y+=player.dy;
        if(player.y+player.height>=360){
          player.y=360-player.height;
          player.dy=0;
          player.grounded=true;
          player.rotation=0;
        }else{
          player.rotation+=0.25;
        }
        for(let p of platforms){
          p.x-=speed;
          if(player.x+player.width>p.x&&player.x<p.x+p.width&&player.y+player.height>=p.y&&player.y+player.height<=p.y+20&&player.dy>=0){
            player.y=p.y-player.height;
            player.dy=0;
            player.grounded=true;
            player.rotation=0;
          }
          if(player.x+player.width>p.x&&player.x<p.x+p.width&&player.y<=p.y+p.height&&player.y>=p.y-20&&player.dy<0){
            player.y=p.y+p.height;
            player.dy=2;
            player.grounded=false;
          }
          drawPlatform(p);
        }
        for(let j of jumpPads){
          j.x-=speed;
          drawJumpPad(j);
          if(player.x+player.width>j.x&&player.x<j.x+j.width&&player.y+player.height>=j.y&&player.y+player.height<=j.y+20){
            player.dy=-20;
            player.grounded=false;
          }
        }
        for(let s of spikes){
          s.x-=speed;
          drawJetpackSpike(s);
          if(player.x<s.x+s.width&&player.x+player.width>s.x&&player.y<s.y&&player.y+player.height>s.y-s.height){
            die();return;
          }
        }
        drawCubePlayer();
      }else{
        if(rocketThrust)player.dy-=0.5;else player.dy+=player.gravity;
        player.y+=player.dy;
        if(player.y<0){player.y=0;player.dy=0;}
        if(player.y+player.height>360){player.y=360-player.height;player.dy=0;}
        player.rotation=player.dy*0.05;
        for(let p of platforms){
          p.x-=speed;
          drawPlatform(p);
          if(player.x+player.width>p.x&&player.x<p.x+p.width&&player.y+player.height>p.y&&player.y<p.y+p.height){
            die();return;
          }
        }
        for(let s of spikes){
          s.x-=speed;
          drawJetpackSpike(s);
          if(player.x<s.x+s.width&&player.x+player.width>s.x&&player.y<s.y&&player.y+player.height>s.y-s.height){
            die();return;
          }
        }
        drawRocketPlayer();
      }

      requestAnimationFrame(update);
    }
  </script>
</body>
</html>
